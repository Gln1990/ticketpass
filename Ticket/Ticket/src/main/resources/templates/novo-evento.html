<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TicketRosario - Cadastrar Novo Evento</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
    
</head>
<body>

<div class="menu-app">

    <header class="hero" style="min-height: 25vh; padding-bottom: 40px;">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Painel de Controle</h1>
            <p class="eyebrow" style="margin-top: 5px;">CRIAR NOVAS ATRAÇÕES</p>
        </div>
    </header>

    <main class="cadastro-container">
        <div class="formulario-box">
            <h1>Novo Evento</h1>
            <p class="subtitulo-form">Preencha os dados no sistema da bilheteria</p>

            <form th:action="@{/eventos/salvar}" method="POST" enctype="multipart/form-data">
                <div class="form-grid">
                    
                    <div class="form-group form-group-full">
                        <label>Nome do Evento:</label>
                        <input type="text" name="nome" placeholder="Ex: Show Internacional da Taylor Swift" required />
                    </div>

                    <div class="form-group">
                        <label>📍 Local / Estádio:</label>
                        <input type="text" name="local" placeholder="Ex: Allianz Parque" required />
                    </div>

                    <div class="form-group">
                        <label>📅 Data e Horário:</label>
                        <input type="datetime-local" name="dataEvento" required />
                    </div>

                    <div class="form-group">
                        <label>💰 Preço Inicial do Ingresso (R$):</label>
                        <input type="number" name="precoBase" step="0.01" placeholder="0.00" required />
                    </div>

                    <div class="form-group">
                        <label>📦 Lote Inicial (Estoque):</label>
                        <input type="number" name="quantidadeDisponivel" placeholder="Ex: 25000" required />
                    </div>

                    <div class="form-group form-group-full">
                        <label>🖼️ Banner do Evento (Upload de arquivo):</label>
                        <input type="file" name="nomeImagem" accept="image/*" required />
                    </div>

                    <div class="form-group form-group-full">
                        <label>🎤 Line-Up Completo (Separado por vírgula):</label>
                        <input type="text" name="artistas" placeholder="Ex: Taylor Swift, Sabrina Carpenter" required />
                    </div>

                    <div class="form-group form-group-full">
                        <label>🎵 Setlist / Maiores Sucessos Esperados:</label>
                        <input type="text" name="maioresSucessos" placeholder="Ex: Cruel Summer, Blank Space, Shake It Off" required />
                    </div>

                    <div class="form-group form-group-full">
                        <label>🗺️ Link de Incorporação do Google Maps (URL do iframe src):</label>
                        <input type="text" name="linkMapa" placeholder="Cole apenas o link https://www.google.com/maps/embed..." required />
                    </div>

                    <div class="form-group">
                        <label>🏢 Vezes que já se apresentou em SP:</label>
                        <input type="number" name="vezesEmSp" placeholder="Ex: 4" required />
                    </div>

                    <div class="form-group">
                        <label>🎟️ Setores e Tipos de Ingressos:</label>
                        <input type="text" name="tiposIngresso" placeholder="Ex: Pista, Pista Premium, Cadeira Inferior" required />
                    </div>

                </div>

                <div class="botoes-container">
                    <button type="submit" class="btn-enviar-evento">🚀 CADASTRAR EVENTO NO MYSQL</button>
                    <a th:href="@{/eventos}" class="btn-cancelar-link">Cancelar e Voltar para a Lista</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p>TicketRosario Inc. • Área Interna e Administrativa Segura</p>
		<p>Desenvolvido por Gleyson Rosário</p>
    </div>

</div>

</body>
</html>
