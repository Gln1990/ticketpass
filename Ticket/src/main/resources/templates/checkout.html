<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Selecionar Ingressos</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 40px; }
        .box { max-width: 500px; background: white; padding: 30px; margin: 0 auto; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .info { background: #e9ecef; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-confirmar { background-color: #28a745; color: white; padding: 12px; border: none; border-radius: 4px; width: 100%; font-size: 16px; cursor: pointer; }
        .btn-confirmar:hover { background-color: #218838; }
        .erro { color: red; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h1>Confirmar Compra</h1>
    
    <div class="info">
        <p><strong>Evento:</strong> <span th:text="${evento.nome}">Nome</span></p>
        <p><strong>Preço Unitário:</strong> R$ <span th:text="${evento.precoBase}">0.00</span></p>
        <p><strong>Disponível no Estoque:</strong> <span th:text="${evento.quantidadeDisponivel}">0</span> ingressos</p>
    </div>

    <form th:action="@{/eventos/confirmar-compra}" method="POST">
        <input type="hidden" name="idEvento" th:value="${evento.idEvento}" />
        
        <div class="form-group">
            <label for="quantidade">Quantidade de Ingressos:</label>
            <input type="number" id="quantidade" name="quantidade" min="1" max="10" value="1" required />
        </div>

        <div class="erro" th:if="${erro}" th:text="${erro}"></div>

        <button type="submit" class="btn-confirmar">Finalizar e Calcular Total</button>
    </form>
</div>

</body>
</html>
