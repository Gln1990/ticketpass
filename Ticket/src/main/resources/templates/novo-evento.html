<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Novo Evento</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 40px; }
        .box { max-width: 500px; background: white; padding: 30px; margin: 0 auto; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-salvar { background-color: #007bff; color: white; padding: 12px; border: none; border-radius: 4px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-salvar:hover { background-color: #0056b3; }
        .btn-voltar { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

<div class="box">
    <h1>Novo Evento</h1>
    
    <form th:action="@{/eventos/salvar}" method="POST">
        <div class="form-group">
            <label>Nome do Evento:</label>
            <input type="text" name="nome" placeholder="Ex: Show da Ivete Sangalo" required />
        </div>
        
        <div class="form-group">
            <label>Local:</label>
            <input type="text" name="local" placeholder="Ex: Allianz Parque" required />
        </div>
        
        <div class="form-group">
            <label>Data e Horário:</label>
            <input type="datetime-local" name="dataEvento" required />
        </div>
        
        <div class="form-group">
            <label>Preço do Ingresso (R$):</label>
            <input type="number" name="precoBase" step="0.01" placeholder="0.00" required />
        </div>
        
        <div class="form-group">
            <label>Quantidade de Ingressos (Estoque):</label>
            <input type="number" name="quantidadeDisponivel" placeholder="Ex: 150" required />
        </div>

        <button type="submit" class="btn-salvar">Cadastrar Evento</button>
    </form>
    
    <a href="/eventos" class="btn-voltar">Voltar para a Lista</a>
</div>

</body>
</html>
